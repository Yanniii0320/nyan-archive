<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#050507">
<title>The Orphic Passage — NÝAN.ARCHIVE</title>
<style>
  :root{color-scheme:dark}*{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050507}
  body{font-family:"Cormorant Garamond",Georgia,serif}
  .film{position:fixed;inset:0;background:#050507}
  .film video{position:absolute;inset:0;width:100%;height:100%;border:0;background:#050507;object-fit:contain}
  .film::after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 50%,transparent 45%,rgba(0,0,0,.16) 100%);mix-blend-mode:multiply}
  .back{position:fixed;z-index:5;left:24px;top:22px;color:rgba(255,255,255,.8);text-decoration:none;font:11px/1 "Helvetica Neue",Arial,sans-serif;letter-spacing:.18em;opacity:0;transform:translateY(-5px);transition:opacity .35s ease,transform .35s ease;text-shadow:0 1px 12px rgba(0,0,0,.72)}
  .title{position:fixed;z-index:5;left:24px;bottom:22px;margin:0;color:rgba(255,255,255,.78);font:400 clamp(18px,2vw,28px)/1 "Cormorant Garamond",Georgia,serif;letter-spacing:.06em;opacity:0;transform:translateY(5px);transition:opacity .35s ease,transform .35s ease;text-shadow:0 1px 15px rgba(0,0,0,.72)}
  .sound-entry{position:fixed;z-index:6;left:50%;top:50%;translate:-50% -50%;width:138px;height:138px;border:1px solid rgba(255,255,255,.58);border-radius:50%;background:rgba(5,5,7,.28);backdrop-filter:blur(13px);color:#fff;font:9px/1.5 "Helvetica Neue",Arial,sans-serif;letter-spacing:.18em;cursor:pointer;transition:opacity .35s ease,transform .35s ease}.sound-entry.is-hidden{opacity:0;transform:scale(.8);pointer-events:none}
  body:hover .back,body:hover .title,body:focus-within .back,body:focus-within .title{opacity:1;transform:translateY(0)}
  @media(max-width:700px){.back{left:16px;top:16px;font-size:10px}.title{left:16px;bottom:16px;font-size:18px}}
</style>
</head>
<body>
  <main class="film" aria-label="The Orphic Passage fullscreen film">
    <video id="film" src="./assets/the-orphic-passage.mp4" autoplay controls playsinline preload="auto" aria-label="The Orphic Passage"></video>
  </main>
  <button class="sound-entry is-hidden" id="soundEntry" type="button">ENTER<br>WITH SOUND</button>
  <a class="back" id="back" href="./index.html?return=1">← BUFFER</a>
  <h1 class="title">The Orphic Passage</h1>
  <script>
    const film = document.querySelector('#film');
    const soundEntry = document.querySelector('#soundEntry');

    film.play().catch(() => {
      film.muted = true;
      film.play().then(() => soundEntry.classList.remove('is-hidden')).catch(() => {});
    });

    soundEntry.addEventListener('click', () => {
      film.muted = false;
      film.play();
      soundEntry.classList.add('is-hidden');
    });

    document.querySelector('#back').addEventListener('click', (event) => {
      event.preventDefault();
      if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
      location.href = event.currentTarget.href;
    });
  </script>
</body>
</html>
