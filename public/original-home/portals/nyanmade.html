<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NyanMade - It's Me!</title> <!-- Optional: Update title too -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        /* --- ALL CSS CODE REMAINS THE SAME AS BEFORE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #080815; color: #fff; font-family: Arial, sans-serif; position: relative; }
        header { position: fixed; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 100; pointer-events: none; }
        header .title-date h1, header .title-date p { margin-bottom: 5px; font-weight: bold; pointer-events: auto; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        header .title-date h1 { font-size: 1.5em; }
        header .title-date p { font-size: 1em; }
        .bunny { width: 35px; height: 35px; background-color: #FFC0CB; border-radius: 50% 50% 30% 30%; position: absolute; left: 50%; transform: translateX(-50%); top: 10px; pointer-events: auto; cursor: pointer; transition: transform 0.2s ease-out; filter: drop-shadow(0px 2px 3px rgba(255, 192, 203, 0.5)); }
        .bunny:hover { transform: translateX(-50%) scale(1.1) rotate(-5deg); }
        .bunny::before, .bunny::after { content: ''; position: absolute; width: 10px; height: 18px; background-color: #FFC0CB; border-radius: 50% 50% 0 0; top: -10px; }
        .bunny::before { left: 5px; transform: rotate(-20deg); }
        .bunny::after { right: 5px; transform: rotate(20deg); }
        nav { display: flex; gap: 5px; pointer-events: auto; }
        nav a { color: #fff; text-decoration: none; border: 1px solid #fff; padding: 5px 10px; font-size: 0.9em; transition: background-color 0.2s, color 0.2s; background-color: rgba(0,0,0,0.3); border-radius: 3px; }
        nav a:hover { background-color: #fff; color: #000; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        canvas { display: block; background-color: transparent !important; }
        @media (max-width: 768px) {
            header { flex-direction: column; align-items: center; gap: 20px; position: relative; padding-top: 15px; width: 100%; left: 0; right: 0; }
            header .title-date { text-align: center; order: 1; }
            .bunny { position: relative; left: auto; transform: none; order: 2; margin-top: 5px; }
            nav { justify-content: center; flex-wrap: wrap; order: 3; width: 100%; padding: 0 10px; }
            nav a { font-size: 0.8em; padding: 4px 8px; }
        }
        @media (max-width: 480px) {
            header .title-date h1 { font-size: 1.2em; }
            header .title-date p { font-size: 0.9em; }
            nav a { font-size: 0.7em; padding: 3px 6px; }
            .bunny { width: 30px; height: 30px; }
            .bunny::before, .bunny::after { width: 8px; height: 15px; top: -8px; }
        }
    </style>
</head>
<body>
    <a href="../index.html?world=buffer" style="position:fixed;z-index:9999;top:18px;left:20px;color:#fff;background:rgba(0,0,0,.42);padding:8px 10px;text-decoration:none;font:9px monospace;letter-spacing:.14em">← PORTAL</a>
    <header>
        <div class="title-date">
            <!-- **** THIS LINE IS CHANGED **** -->
            <h1>NyanMade</h1>
            <!-- ****************************** -->
            <p>HI, IT'S ME! 27/02/25</p>
        </div>
        <div class="bunny"></div>
        <nav>
            <a href="#">ARCHIEVE</a>
            <a href="#">CATEGORY</a>
            <a href="#">ABOUT</a>
            <a href="#">CONTACT</a>
        </nav>
    </header>

    <div id="canvas-container"></div>

    <script>
        // --- ALL JAVASCRIPT CODE REMAINS THE SAME AS BEFORE ---
        document.addEventListener('DOMContentLoaded', () => {
            const { Engine, Render, Runner, World, Bodies, Body, Mouse, MouseConstraint, Events, Composite } = Matter;
            const engine = Engine.create();
            const world = engine.world;
            engine.world.gravity.y = 0.5;
            const canvasContainer = document.getElementById('canvas-container');
            let canvasWidth = canvasContainer.clientWidth;
            let canvasHeight = canvasContainer.clientHeight;
            const render = Render.create({ element: canvasContainer, engine: engine, options: { width: canvasWidth, height: canvasHeight, wireframes: false, background: 'transparent' } });
            const wallThickness = 150;
            const ground = Bodies.rectangle(canvasWidth / 2, canvasHeight + wallThickness / 2, canvasWidth * 2.5, wallThickness, { isStatic: true, label: 'ground', render: { visible: false } });
            const leftWall = Bodies.rectangle(-wallThickness / 2, canvasHeight / 2, wallThickness, canvasHeight * 2.5, { isStatic: true, label: 'wall-left', render: { visible: false } });
            const rightWall = Bodies.rectangle(canvasWidth + wallThickness / 2, canvasHeight / 2, wallThickness, canvasHeight * 2.5, { isStatic: true, label: 'wall-right', render: { visible: false } });
            const ceiling = Bodies.rectangle(canvasWidth / 2, -wallThickness / 2, canvasWidth * 2.5, wallThickness, { isStatic: true, label: 'ceiling', render: { visible: false } });
            World.add(world, [ground, leftWall, rightWall, ceiling]);
            const calyxPath = "M 0 -20 L 10 -10 L 20 -15 L 15 0 L 20 15 L 10 10 L 0 20 L -10 10 L -20 15 L -15 0 L -20 -15 L -10 -10 Z";
            const tomatoColor = '#FF6347';
            const tomatoHighlightColor = '#FF0000';
            const stemColor = '#2E8B57';
            const createTomatoSvg = (bgColor) => { const svgString = `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="-50 -50 100 100"><circle cx="0" cy="0" r="48" fill="${bgColor}" stroke="rgba(0,0,0,0.1)" stroke-width="1"/><path d="${calyxPath}" fill="${stemColor}" transform="scale(0.7)"/></svg>`; return `data:image/svg+xml;base64,${btoa(svgString)}`; };
            const tomatoSvgUri = createTomatoSvg(tomatoColor);
            const tomatoHighlightSvgUri = createTomatoSvg(tomatoHighlightColor);
            const blueberryColor = '#4169E1';
            const blueberryFaceSvg = `data:image/svg+xml;base64,${btoa(`<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="-40 -40 80 80"><defs><filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><circle cx="0" cy="0" r="39" fill="${blueberryColor}" /><path d="M -12 5 Q 0 15 12 5" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glow)"/><circle cx="-15" cy="-5" r="3" fill="white" filter="url(#glow)"/><circle cx="15" cy="-5" r="3" fill="white" filter="url(#glow)"/><path d="M 0 -18 l 5 5 l -5 -2 l -5 2 Z" fill="#6A5ACD" transform="scale(1.5) rotate(180) translate(0, 15)" /></svg>`)}`;
            const bodies = [];
            const baseScaleFactor = Math.min(canvasWidth / 800, canvasHeight / 600, 1.5);
            const createTomato = (x, y, radius) => { const scale = (radius * 2) / 100; return Bodies.circle(x, y, radius, { label: 'tomato', friction: 0.4, frictionAir: 0.005, restitution: 0.4, density: 0.0015, render: { sprite: { texture: tomatoSvgUri, xScale: scale, yScale: scale } } }); };
            const largeTomatoSize = 110 * baseScaleFactor;
            const mediumTomatoSize = 75 * baseScaleFactor;
            const smallTomatoSize = 60 * baseScaleFactor;
            bodies.push(createTomato(canvasWidth * 0.25, canvasHeight * 0.4, largeTomatoSize));
            bodies.push(createTomato(canvasWidth * 0.15, canvasHeight * 0.7, mediumTomatoSize));
            bodies.push(createTomato(canvasWidth * 0.35, canvasHeight * 0.75, smallTomatoSize));
            bodies.push(createTomato(canvasWidth * 0.7, canvasHeight * 0.35, 100 * baseScaleFactor));
            bodies.push(createTomato(canvasWidth * 0.85, canvasHeight * 0.5, smallTomatoSize));
            bodies.push(createTomato(canvasWidth * 0.75, canvasHeight * 0.7, mediumTomatoSize));
            const blueberrySize = 80 * baseScaleFactor;
            const blueberryScale = (blueberrySize * 2) / 80;
            const blueberry = Bodies.circle(canvasWidth * 0.55, canvasHeight * 0.5, blueberrySize, { label: 'blueberry', friction: 0.3, frictionAir: 0.01, restitution: 0.5, density: 0.001, render: { sprite: { texture: blueberryFaceSvg, xScale: blueberryScale * 1.1, yScale: blueberryScale * 1.1 } } });
            bodies.push(blueberry);
            World.add(world, bodies);
            const mouse = Mouse.create(render.canvas);
            const mouseConstraint = MouseConstraint.create(engine, { mouse: mouse, constraint: { stiffness: 0.1, render: { visible: false } } });
            mouseConstraint.collisionFilter.mask = 0x0001;
            blueberry.collisionFilter.category = 0x0002;
            bodies.forEach(body => { if (body.label === 'tomato') { body.collisionFilter.category = 0x0001; } });
            Events.on(mouseConstraint, 'startdrag', (event) => { const body = event.body; if (body.label === 'tomato') { if (body.originalScaleX === undefined) { body.originalScaleX = body.render.sprite.xScale; body.originalScaleY = body.render.sprite.yScale; body.originalTexture = body.render.sprite.texture; } const highlightScaleFactor = 1.15; Body.setAngle(body, body.angle); body.render.sprite.texture = tomatoHighlightSvgUri; body.render.sprite.xScale = body.originalScaleX * highlightScaleFactor; body.render.sprite.yScale = body.originalScaleY * highlightScaleFactor; } });
            Events.on(mouseConstraint, 'enddrag', (event) => { const body = event.body; if (body.label === 'tomato' && body.originalScaleX !== undefined) { Body.setAngle(body, body.angle); body.render.sprite.texture = body.originalTexture; body.render.sprite.xScale = body.originalScaleX; body.render.sprite.yScale = body.originalScaleY; delete body.originalScaleX; delete body.originalScaleY; delete body.originalTexture; } });
            World.add(world, mouseConstraint);
            render.mouse = mouse;
            const runner = Runner.create();
            Runner.run(runner, engine);
            Render.run(render);
            let currentScaleFactor = baseScaleFactor;
            window.addEventListener('resize', () => { canvasWidth = canvasContainer.clientWidth; canvasHeight = canvasContainer.clientHeight; render.options.width = canvasWidth; render.options.height = canvasHeight; render.canvas.width = canvasWidth; render.canvas.height = canvasHeight; Matter.Body.setPosition(ground, { x: canvasWidth / 2, y: canvasHeight + wallThickness / 2 }); Matter.Body.setVertices(ground, Matter.Vertices.fromPath(`L 0 0 L ${canvasWidth * 2.5} 0 L ${canvasWidth * 2.5} ${wallThickness} L 0 ${wallThickness}`)); Matter.Body.setPosition(leftWall, { x: -wallThickness / 2, y: canvasHeight / 2 }); Matter.Body.setVertices(leftWall, Matter.Vertices.fromPath(`L 0 0 L ${wallThickness} 0 L ${wallThickness} ${canvasHeight * 2.5} L 0 ${canvasHeight * 2.5}`)); Matter.Body.setPosition(rightWall, { x: canvasWidth + wallThickness / 2, y: canvasHeight / 2 }); Matter.Body.setVertices(rightWall, Matter.Vertices.fromPath(`L 0 0 L ${wallThickness} 0 L ${wallThickness} ${canvasHeight * 2.5} L 0 ${canvasHeight * 2.5}`)); Matter.Body.setPosition(ceiling, { x: canvasWidth / 2, y: -wallThickness / 2 }); Matter.Body.setVertices(ceiling, Matter.Vertices.fromPath(`L 0 0 L ${canvasWidth * 2.5} 0 L ${canvasWidth * 2.5} ${wallThickness} L 0 ${wallThickness}`)); const newScaleFactor = Math.min(canvasWidth / 800, canvasHeight / 600, 1.5); const scaleRatio = newScaleFactor / currentScaleFactor; Composite.allBodies(world).forEach(body => { if (!body.isStatic && body.label) { const oldRadius = body.circleRadius; const newRadius = oldRadius * scaleRatio; Matter.Body.scale(body, scaleRatio, scaleRatio); body.circleRadius = newRadius; let svgSize = (body.label === 'blueberry') ? 80 : 100; let spriteScale = (newRadius * 2) / svgSize; if (body.label === 'blueberry') { spriteScale *= 1.1; } if (body.label === 'tomato' && body.originalScaleX !== undefined) { const highlightFactor = 1.15; body.originalScaleX = spriteScale; body.originalScaleY = spriteScale; body.render.sprite.xScale = body.originalScaleX * highlightFactor; body.render.sprite.yScale = body.originalScaleY * highlightFactor; } else { body.render.sprite.xScale = spriteScale; body.render.sprite.yScale = spriteScale; } } }); currentScaleFactor = newScaleFactor; });
            const bunnyElement = document.querySelector('.bunny');
            if (bunnyElement) { bunnyElement.addEventListener('click', () => { bunnyElement.style.transform = 'translateX(-50%) scale(1.2) rotate(10deg)'; setTimeout(() => { if (bunnyElement.matches(':hover')) { bunnyElement.style.transform = 'translateX(-50%) scale(1.1) rotate(-5deg)'; } else { bunnyElement.style.transform = 'translateX(-50%)'; } }, 150); }); bunnyElement.addEventListener('mouseleave', () => { setTimeout(() => { if (bunnyElement.style.transform.includes('scale(1.2)')) return; bunnyElement.style.transform = 'translateX(-50%)'; }, 50); }); bunnyElement.addEventListener('mouseenter', () => { if (!bunnyElement.style.transform.includes('scale(1.2)')) { bunnyElement.style.transform = 'translateX(-50%) scale(1.1) rotate(-5deg)'; } }); }
        });
    </script>
<script src="./portal-chaos.js"></script>
</body>
</html>
