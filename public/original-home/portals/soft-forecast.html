<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Soft Forecast — NÝAN.ARCHIVE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
  *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#d9e0ee;color:#233148}body{font-family:"DM Mono",monospace}.sky{position:fixed;inset:-20%;background:radial-gradient(ellipse at 28% 25%,#eebee2,transparent 24%),radial-gradient(ellipse at 76% 68%,#adcef5,transparent 29%),radial-gradient(ellipse at 48% 56%,#fbf0bd,transparent 31%),#d9e0ee;filter:blur(38px);animation:float 16s ease-in-out infinite alternate}.sky:after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,.5),transparent);mix-blend-mode:soft-light}@keyframes float{to{transform:translate3d(4%,-3%,0) rotate(3deg)}}header{position:fixed;z-index:3;inset:0 0 auto;padding:24px 28px;display:flex;justify-content:space-between;font-size:9px;letter-spacing:.17em}.back{color:inherit;text-decoration:none;opacity:.7}.forecast{position:fixed;z-index:2;inset:0;display:grid;place-items:center;text-align:center;padding:8vw}.date{font-size:9px;letter-spacing:.23em}.condition{margin:21px 0 25px;font:italic clamp(58px,12vw,184px)/.77 "Instrument Serif",Georgia,serif;letter-spacing:-.08em;max-width:900px}.detail{max-width:430px;margin:0;font:clamp(13px,1.3vw,17px)/1.45 "Instrument Serif",Georgia,serif}.temperature{position:fixed;right:28px;bottom:25px;font-size:9px;letter-spacing:.15em}.meter{display:inline-block;width:95px;height:1px;margin:0 9px 3px;background:rgba(35,49,72,.22);vertical-align:middle}.meter i{display:block;width:var(--w,55%);height:1px;background:#233148;transition:width 1s}.touch{position:fixed;left:50%;bottom:25px;translate:-50%;font-size:8px;letter-spacing:.17em;opacity:.65;white-space:nowrap}.drop{position:fixed;width:2px;height:2px;border-radius:50%;background:#fff;box-shadow:0 0 14px 5px #fff8;pointer-events:none;animation:drop 3.5s linear forwards}@keyframes drop{to{transform:translate(var(--dx),110vh);opacity:0}}
</style></head>
<body><div class="sky"></div><header><a class="back" href="../index.html?world=buffer">← PORTAL</a><span>07 / SOFT FORECAST</span></header><main class="forecast"><p class="date" id="date">FORECAST FOR AN UNNAMED PLACE</p><h1 class="condition" id="condition">the light<br>will forgive you</h1><p class="detail" id="detail">A slow, translucent weather system. No umbrellas are necessary; just let the day become slightly less solid.</p></main><p class="temperature">FEELING <span class="meter"><i id="meter"></i></span><span id="value">58%</span></p><p class="touch">CLICK FOR A DIFFERENT WEATHER</p>
<script>
const data=[['MIST WITHIN MIST','the light<br>will forgive you','A slow, translucent weather system. No umbrellas are necessary; just let the day become slightly less solid.'],['PERSONAL CLIMATE','warm rain<br>in reverse','There is a chance of remembering something gently, without needing to understand why.'],['LOW VISIBILITY','all edges<br>become kind','Expect softened distances and a temporary inability to tell where one feeling ends.'],['BLUE ADVISORY','the sky<br>keeps a secret','Pressure is dropping. Let it. The afternoon is practicing becoming an answer.']];let i=0;addEventListener('pointerdown',e=>{i=(i+1)%data.length;date.textContent=data[i][0];condition.innerHTML=data[i][1];detail.textContent=data[i][2];value.textContent=(42+i*17)+'%';meter.style.setProperty('--w',(42+i*17)+'%');for(let n=0;n<12;n++){let d=document.createElement('i');d.className='drop';d.style.left=(e.clientX+(Math.random()-.5)*180)+'px';d.style.top=(e.clientY+(Math.random()-.5)*70)+'px';d.style.setProperty('--dx',(Math.random()-.5)*180+'px');document.body.append(d);setTimeout(()=>d.remove(),3600)}});
</script><script src="./portal-chaos.js"></script></body></html>
