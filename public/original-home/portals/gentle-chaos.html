<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gentle Chaos — NÝAN.ARCHIVE</title><style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:ital@0;1&display=swap');*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#17170f;color:#faf5e8}body{font-family:"DM Mono",monospace}canvas{position:fixed;inset:0;width:100%;height:100%}header{position:fixed;z-index:2;inset:0 0 auto;padding:24px 28px;display:flex;justify-content:space-between;font-size:9px;letter-spacing:.18em}.back{color:inherit;text-decoration:none;opacity:.68}.copy{position:fixed;z-index:2;left:50%;top:50%;translate:-50% -50%;width:80vw;text-align:center;pointer-events:none}.copy h1{margin:0;font:italic clamp(52px,10vw,150px)/.82 "Playfair Display",serif;letter-spacing:-.08em}.copy p{margin:20px 0;font-size:8px;letter-spacing:.2em;opacity:.62}.foot{position:fixed;z-index:2;left:50%;bottom:25px;translate:-50%;font-size:8px;letter-spacing:.16em;opacity:.55;white-space:nowrap}
</style></head><body><canvas id="c"></canvas><header><a class="back" href="../index.html?world=buffer">← PORTAL</a><span>08 / GENTLE CHAOS</span></header><div class="copy"><h1>nothing is<br>in a hurry</h1><p>THE DOTS WILL FOLLOW YOUR HAND, BUT NOT OBEDIENTLY</p></div><p class="foot">CLICK TO CHANGE THE TEMPERATURE</p><script>
const c=document.querySelector('#c'),x=c.getContext('2d');let W,H,mouse={x:innerWidth/2,y:innerHeight/2},warm=0;const dots=Array.from({length:110},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*12+2,h:Math.random()*45}));function size(){W=c.width=innerWidth*devicePixelRatio;H=c.height=innerHeight*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}size();addEventListener('resize',size);addEventListener('pointermove',e=>mouse={x:e.clientX,y:e.clientY});addEventListener('pointerdown',()=>warm=(warm+1)%3);function loop(){x.fillStyle=['#17170f','#10151a','#21151d'][warm];x.fillRect(0,0,innerWidth,innerHeight);dots.forEach(d=>{let dx=mouse.x-d.x,dy=mouse.y-d.y,dist=Math.hypot(dx,dy)+1,force=Math.min(1,150/dist)*.018;d.vx+=dx*force;d.vy+=dy*force;d.vx*=.982;d.vy*=.982;d.x+=d.vx;d.y+=d.vy;if(d.x<-20||d.x>innerWidth+20)d.vx*=-1;if(d.y<-20||d.y>innerHeight+20)d.vy*=-1;let col=warm===0?`hsl(${42+d.h} 68% 76%)`:warm===1?`hsl(${180+d.h} 60% 72%)`:`hsl(${320+d.h} 62% 78%)`;x.beginPath();x.arc(d.x,d.y,d.r,0,7);x.fillStyle=col;x.globalAlpha=.48;x.fill();x.globalAlpha=1});requestAnimationFrame(loop)}loop();
</script><script src="./portal-chaos.js"></script></body></html>
